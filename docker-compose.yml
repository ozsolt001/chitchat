version: "3.9"

services:
  chat-backend:
    build: .
    container_name: chat-backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - chat-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

volumes:
  chat-data: